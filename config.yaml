# ==========================================================
# CONFIG CLASH VERGE WINDOWS - FULLY FIXED & OPTIMIZED
# ==========================================================
port: 7890
socks-port: 7891
mixed-port: 7893
redir-port: 7892
allow-lan: true
mode: rule
log-level: info
ipv6: true

# DNS Detail & Optimalisasi Fake-IP
dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  listen: 0.0.0.0:7874
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.localdomain"
    - "*.example"
    - "*.invalid"
    - "*.localhost"
    - "*.test"
    - "*.local"
    - "*.home.arpa"
    - time.*.com
    - time.*.gov
    - time.*.apple.com
    - ntp.*.com
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - msftconnecttest.com
    - msftncsi.com
    - stun.l.google.com
    - "+.nflxvideo.net"
  default-nameserver:
    - 8.8.8.8
    - 1.1.1.1
  nameserver:
    - 1.1.1.1
    - 8.8.8.8
    - 9.9.9.9
  fallback:
    - 1.1.1.1
    - 8.8.8.8

# TUN Mode Desktop App Kompatibilitas
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true

