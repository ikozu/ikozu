# ==========================================================
# PROXY PROVIDERS (Remote Files dari GitHub)
# ==========================================================
proxy-providers:
  premium-provider:
    type: http
    # GANTI LINK DI BAWAH DENGAN LINK RAW premium_proxies.yaml ANDA
    url: "https://raw.githubusercontent.com/ikozu/ikozu/refs/heads/main/premium_proxies.yaml"
    path: ./providers/premium_proxies.yaml
    interval: 3600
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

  scraping-provider:
    type: http
    # GANTI LINK DI BAWAH DENGAN LINK RAW scraping_proxies.yaml ANDA
    url: "https://raw.githubusercontent.com/ikozu/ikozu/refs/heads/main/scraping_proxies.yaml"
    path: ./providers/scraping_proxies.yaml
    interval: 3600
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

# ==========================================================
# PROXY GROUPS
# ==========================================================
proxy-groups:
  - name: 💎 Premium Account
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 900
    tolerance: 50
    lazy: true
    use:
      - premium-provider

  - name: 👾Scraping Account
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 900
    tolerance: 50
    lazy: true
    use:
      - scraping-provider

  - name: 🤲 BANSOS ⚡ Auto-Ping
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 900
    tolerance: 50
    lazy: true
    use:
      - scraping-provider

  - name: 🚀 Proxy
    type: select
    proxies:
      - 💎 Premium Account
      - 🔮 Load-Balance
      - ⚡ Auto-Ping
      - 👾Scraping Account
      - 🤲 BANSOS ⚡ Auto-Ping
      - DIRECT

  - name: 🔮 Load-Balance
    type: load-balance
    url: http://www.gstatic.com/generate_204
    interval: 900
    strategy: round-robin
    lazy: true
    proxies:
      - 💎 Premium Account
      - 👾Scraping Account

  - name: ⚡ Auto-Ping
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 900
    tolerance: 50
    lazy: true
    proxies:
      - 💎 Premium Account
      - 👾Scraping Account
      - 🤲 BANSOS ⚡ Auto-Ping

